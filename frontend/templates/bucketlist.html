{% extends "base.html" %}

{% block content %}
<style>
    .card-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        /* space between cards */
        justify-content: center;
        margin-top: 20px;
    }

    .card {
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .card img {
        height: 180px;
        object-fit: cover;
        /* keeps images clean */
    }

    .bottom-link {
        margin-top: 40px;
        text-align: center;
    }
</style>

<div class="card-container">
    {% for each_place in places %}
    <div class="card" style="width: 300px;">
        <img src="{{ url_for('static', filename='images/tahiti.jpg') }}" class="card-img-top">
        <div class="card-body text-center">
            <h5 class="card-title">{{ each_place.name }}</h5>
            <h6 class="card-subtitle mb-2 text-muted">${{ each_place.estimated_cost }}</h6>
            <p class="card-text">{{ each_place.additional_info }}</p>
        </div>
    </div>
    {% endfor %}
</div>

<div class="bottom-link">
    <h2><a href="/new_destination">Enter a new bucket list destination</a></h2>
</div>
{% endblock %}
